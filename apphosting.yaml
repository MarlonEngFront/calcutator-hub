## Firebase App Hosting — Voiston Calculator Hub
## Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3

env:
  # ── Voiston API (server-side, não exposto ao browser) ─────────────────────────
  - variable: VOISTON_API_URL
    value: "https://api.voiston.ai/"
    availability:
      - BUILD
      - RUNTIME

  - variable: JJ_GENERIC_PATIENT_ID
    value: "999"
    availability:
      - RUNTIME

  # Sensível — crie no Secret Manager como "hub-jj-generic-user-email"
  - variable: JJ_GENERIC_USER_EMAIL
    secret: hub-jj-generic-user-email
    availability:
      - RUNTIME

  # ── Credenciais públicas (compartilhadas com jjvisionpro) ─────────────────────
  - variable: NEXT_PUBLIC_JJ_OWNER_EMAIL
    value: "jjvisionpro@voiston.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_JJ_OWNER_ID
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_JJ_DATA_PARTNER_ID
    value: "1786356"
    availability:
      - BUILD
      - RUNTIME

  # Sensível — crie no Secret Manager como "hub-jj-secret"
  - variable: NEXT_PUBLIC_JJ_SECRET
    secret: hub-jj-secret
    availability:
      - BUILD
      - RUNTIME

  # ── Analytics & Gateway ────────────────────────────────────────────────────────
  - variable: NEXT_PUBLIC_GA4_MEASUREMENT_ID
    value: "G-Y9V1M2W607"
    availability:
      - BUILD
      - RUNTIME

  # Sensível — crie no Secret Manager como "hub-gateway-url"
  - variable: NEXT_PUBLIC_EXTERNAL_CALC_GATEWAY_URL
    secret: hub-gateway-url
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ENABLE_EXTERNAL_TECNIS_CALC
    value: "true"
    availability:
      - BUILD
      - RUNTIME
