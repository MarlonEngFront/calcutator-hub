name: Deploy to Firebase App Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_JJ_OWNER_EMAIL: 'jjvisionpro@voiston.com'
          NEXT_PUBLIC_JJ_OWNER_ID: '1'
          NEXT_PUBLIC_JJ_DATA_PARTNER_ID: '1786356'
          NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}
          NEXT_PUBLIC_EXTERNAL_CALC_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_EXTERNAL_CALC_GATEWAY_URL }}
          NEXT_PUBLIC_JJ_SECRET: ${{ secrets.NEXT_PUBLIC_JJ_SECRET }}
          NEXT_PUBLIC_ENABLE_EXTERNAL_TECNIS_CALC: 'true'
          VOISTON_API_URL: 'https://api.voiston.ai/'
          JJ_GENERIC_PATIENT_ID: '999'
          JJ_GENERIC_USER_EMAIL: ${{ secrets.JJ_GENERIC_USER_EMAIL }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VOISTON_HUB }}'
          channelId: live
          projectId: voiston-hub
          appHostingBackend: calculator-hub
